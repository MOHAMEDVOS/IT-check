<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0a0e17; color:#e0e4ec; min-height:100vh; }

        /* Header */
        .header { display:flex; align-items:center; justify-content:space-between; padding:18px 32px;
                   background:linear-gradient(135deg,#0d1220,#141c2e); border-bottom:1px solid #1e293b; }
        .header .logo { display:flex; align-items:center; gap:14px; }
        .header .logo-icon { width:38px; height:38px;
                             border-radius:10px; display:flex; align-items:center; justify-content:center;
                             object-fit: contain; }
        .header h1 { font-size:20px; font-weight:700; }
        .header h1 span { color:#00d4aa; }
        .header-right { display:flex; gap:12px; align-items:center; }
        .badge { padding:6px 16px; border-radius:8px; font-size:12px; font-weight:600;
                 background:#141c2e; border:1px solid #1e293b; }
        .badge .num { font-size:16px; font-weight:700; margin-left:6px; }
        .badge.agents .num { color:#00d4aa; }
        .badge.issues .num { color:#f59e0b; }
        .live-dot { width:8px; height:8px; border-radius:50%; background:#00d4aa; display:inline-block;
                    animation:pulse 2s infinite; margin-right:6px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
        .btn { padding:8px 18px; border-radius:8px; border:none; cursor:pointer; font-size:12px;
               font-weight:600; transition:.2s; }
        .btn-outline { background:transparent; border:1px solid #1e293b; color:#94a3b8; }
        .btn-outline:hover { border-color:#00d4aa; color:#00d4aa; }
        .btn-red { background:#dc2626; color:#fff; }
        .btn-red:hover { background:#ef4444; }

        /* Toolbar */
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:16px 32px; }
        .search-box { background:#141c2e; border:1px solid #1e293b; border-radius:10px; padding:10px 16px;
                      color:#e0e4ec; font-size:13px; width:260px; outline:none; font-family:inherit; }
        .search-box:focus { border-color:#00d4aa; }
        .last-updated { font-size:11px; color:#64748b; }

        /* Table */
        .table-wrap { padding:0 32px 32px; overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        thead th { background:#0d1220; color:#64748b; font-size:11px; font-weight:600;
                   text-transform:uppercase; letter-spacing:.5px; padding:12px 14px; text-align:left;
                   border-bottom:1px solid #1e293b; white-space:nowrap; cursor:pointer; user-select:none; }
        thead th:hover { color:#00d4aa; }
        tbody tr { border-bottom:1px solid #111827; transition:.15s; cursor:pointer; }
        tbody tr:hover { background:#111827; }
        tbody td { padding:12px 14px; font-size:13px; vertical-align:top; }

        /* Detail row */
        .detail-row { display:none; }
        .detail-row.open { display:table-row; }
        .detail-row td { padding:0; background:#0d1220; }
        .detail-panel { padding:20px 28px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
        .detail-section { background:#111827; border-radius:10px; padding:16px; border:1px solid #1e293b; }
        .detail-section h4 { color:#00d4aa; font-size:11px; font-weight:700; text-transform:uppercase;
                             letter-spacing:.5px; margin-bottom:10px; }
        .detail-row-item { display:flex; justify-content:space-between; padding:5px 0;
                          font-size:12px; border-bottom:1px solid #1a2332; }
        .detail-row-item:last-child { border-bottom:none; }
        .detail-row-item .label { color:#64748b; }
        .detail-row-item .value { color:#e0e4ec; font-weight:500; }

        /* Status pills */
        .pill { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:600; display:inline-block; }
        .pill-good { background:#064e3b; color:#34d399; }
        .pill-warn { background:#451a03; color:#fbbf24; }
        .pill-bad { background:#450a0a; color:#f87171; }
        .pill-neutral { background:#1e293b; color:#94a3b8; }
        .pill-wifi { background:#1e1b4b; color:#818cf8; }
        .pill-eth { background:#022c22; color:#6ee7b7; }

        /* Empty state */
        .empty { text-align:center; padding:80px 20px; }
        .empty-icon { font-size:48px; margin-bottom:16px; opacity:.3; }
        .empty h3 { color:#64748b; font-weight:600; margin-bottom:6px; }
        .empty p { color:#475569; font-size:13px; }
 
        /* Delete button */
        .btn-delete { background:transparent; border:1px solid #1e293b; color:#64748b; padding:4px 10px;
                      border-radius:6px; cursor:pointer; font-size:12px; transition:.2s; }
        .btn-delete:hover { border-color:#dc2626; color:#f87171; background:#450a0a; }
        
        /* PDF / Copy buttons */
        .btn-pdf { background:transparent; border:1px solid #1e293b; color:#94a3b8; padding:4px 10px;
                   border-radius:6px; cursor:pointer; font-size:11px; transition:.2s; margin-right:4px; }
        .btn-pdf:hover { border-color:#00d4aa; color:#00d4aa; background:#064e3b; }
        .btn-copy { background:transparent; border:1px solid #1e293b; color:#94a3b8; padding:4px 10px;
                    border-radius:6px; cursor:pointer; font-size:11px; transition:.2s; margin-right:4px; }
        .btn-copy:hover { border-color:#22c55e; color:#bbf7d0; background:#022c22; }

        /* Responsive */
        @media(max-width:1200px) { .detail-panel { grid-template-columns:1fr 1fr; } }
        @media(max-width:768px) { .detail-panel { grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="/favicon.ico" class="logo-icon" alt="V">
        <h1>IT Dashboard</h1>
    </div>
    <div class="header-right">
        <div class="badge agents">AGENTS <span class="num" id="agent-count">0</span></div>
        <div class="badge issues">ISSUES <span class="num" id="issue-count">0</span></div>
        <span style="color:#94a3b8;font-size:12px"><span class="live-dot"></span> LIVE</span>
        <a href="/logout" class="btn btn-red">Logout</a>
    </div>
</div>

<div class="toolbar">
    <input class="search-box" type="text" id="searchBox" placeholder="Search agents...">
    <span class="last-updated" id="lastUpdated">Loading...</span>
</div>

<div class="table-wrap">
<table id="resultsTable">
    <thead>
            <th onclick="sortTable(0)">RES-ID ▵</th>
            <th onclick="sortTable(1)">Agent ▵</th>
            <th onclick="sortTable(2)">Team ▵</th>
            <th onclick="sortTable(3)">AnyDesk ▵</th>
            <th onclick="sortTable(4)">PC Specs ▵</th>
            <th onclick="sortTable(5)">Chrome ▵</th>
            <th onclick="sortTable(6)">Network ▵</th>
            <th onclick="sortTable(7)">Connection ▵</th>
            <th onclick="sortTable(8)">Speed ▵</th>
            <th onclick="sortTable(9)">VPN ▵</th>
            <th onclick="sortTable(10)">Mic ▵</th>
            <th onclick="sortTable(11)">Notes ▵</th>
            <th onclick="sortTable(12)">Disk ▵</th>
            <th onclick="sortTable(13)">Checked ▵</th>
            <th style="width:50px"></th>
        </tr>
    </thead>
    <tbody id="resultsBody">
        <tr><td colspan="15">
            <div class="empty">
                <div class="empty-icon">—</div>
                <h3>No agents yet</h3>
                <p>Run VOS on any machine and the results will appear here automatically.</p>
            </div>
        </td></tr>
    </tbody>
</table>
</div>

<script>
let allData = [];
let sortCol = -1, sortAsc = true;

// Team color palette — each team gets a unique, consistent color
const TEAM_COLORS = [
    { bg:'#422006', fg:'#fbbf24' },  // amber/yellow
    { bg:'#0c4a6e', fg:'#38bdf8' },  // sky blue
    { bg:'#064e3b', fg:'#34d399' },  // emerald
    { bg:'#4c1d95', fg:'#a78bfa' },  // purple
    { bg:'#831843', fg:'#f472b6' },  // pink
    { bg:'#1e3a5f', fg:'#60a5fa' },  // blue
    { bg:'#713f12', fg:'#facc15' },  // gold
    { bg:'#134e4a', fg:'#2dd4bf' },  // teal
    { bg:'#7c2d12', fg:'#fb923c' },  // orange
    { bg:'#1e1b4b', fg:'#818cf8' },  // indigo
    { bg:'#3b0764', fg:'#c084fc' },  // violet
    { bg:'#052e16', fg:'#4ade80' },  // green
];

function teamHash(name) {
    let h = 0;
    const s = (name || '').toLowerCase().trim();
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

function teamPill(name) {
    if (!name || name === '—') return '<span class="pill pill-neutral">—</span>';
    const c = TEAM_COLORS[teamHash(name) % TEAM_COLORS.length];
    return `<span class="pill" style="background:${c.bg};color:${c.fg}">${name}</span>`;
}

function connTypePill(type) {
    if (!type || type === '—') return '<span class="pill pill-neutral">—</span>';
    const t = type.toLowerCase();
    if (t.includes('wi-fi') || t.includes('wifi')) return '<span class="pill pill-wifi">' + type + '</span>';
    if (t.includes('ethernet') || t.includes('eth')) return '<span class="pill pill-eth">' + type + '</span>';
    return '<span class="pill pill-neutral">' + type + '</span>';
}

function statusPill(text) {
    if (!text || text === '—') return '<span class="pill pill-neutral">—</span>';
    const t = text.toLowerCase();
    if (t.includes('good') || t.includes('up_to_date') || t.includes('up to date')) return '<span class="pill pill-good">' + text + '</span>';
    if (t.includes('fair') || t.includes('warn')) return '<span class="pill pill-warn">' + text + '</span>';
    if (t.includes('poor') || t.includes('bad') || t.includes('outdated') || t.includes('needs update')) return '<span class="pill pill-bad">' + text + '</span>';
    return '<span class="pill pill-neutral">' + text + '</span>';
}

function scorePill(score) {
    if (!score && score !== 0) return '<span class="pill pill-neutral">—</span>';
    const s = parseInt(score);
    if (s >= 80) return '<span class="pill pill-good">' + s + '/100</span>';
    if (s >= 50) return '<span class="pill pill-warn">' + s + '/100</span>';
    return '<span class="pill pill-bad">' + s + '/100</span>';
}

function micPill(level) {
    if (!level || level === '—') return '<span class="pill pill-neutral">—</span>';
    const num = parseInt(level);
    if (num >= 50) return '<span class="pill pill-good">' + level + '</span>';
    if (num >= 20) return '<span class="pill pill-warn">' + level + '</span>';
    return '<span class="pill pill-bad">' + level + '</span>';
}

function vpnPill(active, name) {
    if (active) return '<span class="pill pill-bad">Yes</span>';
    return '<span class="pill pill-good">No</span>';
}

async function copySummary(index, evt) {
    if (evt) {
        evt.stopPropagation();
    }
    const r = allData[index];
    if (!r) return;

    let ping = {};
    try { ping = JSON.parse(r.ping_details || '{}'); } catch (e) {}

    // Headset type: plain text, no emojis/symbols
    const headsetType = r.mic_device && r.mic_device !== '—' ? r.mic_device : '—';

    // Connection type: strip any leading icons/bullets (e.g. "⦿ Ethernet" -> "Ethernet")
    let connType = r.connection_type && r.connection_type !== '—' ? r.connection_type : '—';
    if (connType !== '—') {
        connType = connType.replace(/^[^A-Za-z0-9]+/, '').trim();
    }
    const up = (r.upload_mbps || r.upload_mbps === 0) ? r.upload_mbps : '—';
    const down = (r.download_mbps || r.download_mbps === 0) ? r.download_mbps : '—';

    let stability = '—';
    if (ping && (ping.verdict || ping.avg_ms || ping.loss_pct !== undefined)) {
        const avg = ping.avg_ms !== undefined ? ping.avg_ms : '—';
        const loss = ping.loss_pct !== undefined ? ping.loss_pct : 0;
        stability = `${ping.verdict || '—'} (avg ${avg} ms, ${loss}% loss)`;
    } else if (r.connection_stability && r.connection_stability !== '—') {
        stability = r.connection_stability;
    }

    // Try to split "CPU / XXGB RAM" into separate fields so RAM isn't duplicated
    const specs = (r.pc_specs || '').split('/');
    const processor = (specs[0] || r.pc_specs || '—').trim() || '—';
    let ram = '—';
    if (specs.length > 1) {
        const ramMatch = specs[1].match(/(\d+)\s*GB/i);
        if (ramMatch) ram = ramMatch[1] + ' GB';
    } else {
        const ramMatch = (r.pc_specs || '').match(/(\d+)\s*GB/i);
        if (ramMatch) ram = ramMatch[1] + ' GB';
    }
    const storage = r.disk_space || '—';

    const summary = [
        '1. Headset Type',
        '   Type: ' + headsetType,
        '',
        '',
        '2. Internet Connection',
        '   Speed:      Upload ' + up + ' Mbps / Download ' + down + ' Mbps',
        '   Type:      ' + connType,
        '   Stability: ' + stability,
        '',
        '',
        '3. Device Information',
        '   Processor: ' + processor,
        '   RAM:       ' + ram,
        '   Storage:   ' + storage,
    ].join('\n');

    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(summary);
        } else {
            const ta = document.createElement('textarea');
            ta.value = summary;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        const el = document.getElementById('lastUpdated');
        if (el) {
            el.textContent = 'Summary copied for ' + (r.agent_name || 'agent');
        }
    } catch (e) {
        alert('Could not copy summary: ' + e.message);
    }
}

function deleteAgent(name) {
    fetch('/api/results/' + encodeURIComponent(name), {
        method: 'DELETE',
        credentials: 'same-origin'
    })
    .then(r => {
        if (!r.ok) throw new Error('Server returned ' + r.status);
        return r.json();
    })
    .then(() => fetchResults())
    .catch(e => alert('Delete failed: ' + e.message));
    return false;
}

function toggleDetail(i, evt) {
    // Don't toggle if clicking the delete or pdf button
    if (evt && evt.target && (evt.target.classList.contains('btn-delete') || evt.target.closest('.btn-delete') || evt.target.classList.contains('btn-pdf') || evt.target.closest('.btn-pdf'))) return;
    const row = document.getElementById('detail-' + i);
    if (row) row.classList.toggle('open');
}

function downloadPDF(name) {
    const url = '/api/pdf/' + encodeURIComponent(name);
    window.open(url, '_blank');
}

function renderTable(data) {
    const tbody = document.getElementById('resultsBody');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="15"><div class="empty"><div class="empty-icon">--</div><h3>No agents yet</h3><p>Run VOS on any machine and results appear here.</p></div></td></tr>';
        return;
    }

    let html = '';
    let issues = 0;
    data.forEach((r, i) => {
        // Parse ping details
        let ping = {};
        try { ping = JSON.parse(r.ping_details || '{}'); } catch(e) {}

        // Count issues
        const connScore = ping.score || 0;
        if (connScore > 0 && connScore < 60) issues++;
        const dl = r.download_mbps || 0;
        if (dl > 0 && dl < 10) issues++;

        // Main row
        html += `<tr onclick="toggleDetail(${i}, event)">
            <td style="color:#f472b6;font-weight:bold">${r.res_id || '—'}</td>
            <td><strong>${r.agent_name || '—'}</strong></td>
            <td>${teamPill(r.team)}</td>
            <td style="color:#00d4aa;font-family:monospace">${r.anydesk_id || '—'}</td>
            <td>${r.pc_specs || '—'}</td>
            <td>${statusPill(r.chrome_version)}</td>
            <td>${connTypePill(r.connection_type)}</td>
            <td>${scorePill(ping.score)}</td>
            <td>${(r.download_mbps || 0) > 0 ? '<span style="color:#34d399">↓' + r.download_mbps + '</span> / <span style="color:#60a5fa">↑' + r.upload_mbps + '</span> <small>Mbps</small>' : '—'}</td>
            <td>${vpnPill(r.vpn_active, r.vpn_name)}</td>
            <td>${micPill(r.mic_level)}</td>
            <td><small style="color:#fbbf24">${r.notes || ''}</small></td>
            <td>${r.disk_space || '—'}</td>
            <td><small style="color:#64748b">${r.last_checked || '—'}</small></td>
            <td>
                <div style="display:flex;align-items:center">
                    <button class="btn-copy" onclick="copySummary(${i}, event); return false;" title="Copy summary to clipboard">Copy</button>
                    <button class="btn-pdf" onclick="downloadPDF('${(r.agent_name||'').replace(/'/g, "\\'")}'); return false;" title="Download PDF Report">PDF</button>
                    <button class="btn-delete" onclick="deleteAgent('${(r.agent_name||'').replace(/'/g, "\\'")}'); return false;" title="Delete this agent">x</button>
                </div>
            </td>
        </tr>`;

        // Detail row
        html += `<tr class="detail-row" id="detail-${i}"><td colspan="13"><div class="detail-panel">
            <div class="detail-section">
                <h4>SYSTEM</h4>
                <div class="detail-row-item"><span class="label">RES-ID</span><span class="value" style="color:#f472b6;font-weight:bold">${r.res_id || '—'}</span></div>
                <div class="detail-row-item"><span class="label">CPU</span><span class="value">${r.pc_specs || '—'}</span></div>
                <div class="detail-row-item"><span class="label">GPU</span><span class="value">${r.gpu || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Performance</span><span class="value">${r.cpu_label || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Chrome</span><span class="value">${r.chrome_version || '—'}</span></div>
            </div>
            <div class="detail-section">
                <h4>NETWORK</h4>
                <div class="detail-row-item"><span class="label">Type</span><span class="value">${r.connection_type || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Ping Score</span><span class="value">${ping.score ? ping.score + '/100 (' + ping.verdict + ')' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Avg Latency</span><span class="value">${ping.avg_ms ? ping.avg_ms + ' ms' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Jitter</span><span class="value">${ping.jitter_ms ? ping.jitter_ms + ' ms' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Packet Loss</span><span class="value">${ping.loss_pct ? ping.loss_pct + '%' : '0%'}</span></div>
                <div class="detail-row-item"><span class="label">Spikes</span><span class="value">${ping.spikes !== undefined ? ping.spikes : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Distribution</span><span class="value" style="color:#fbbf24">${ping.distribution || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Target</span><span class="value">${ping.target || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Download</span><span class="value" style="color:#34d399">${r.download_mbps ? r.download_mbps + ' Mbps' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Upload</span><span class="value" style="color:#60a5fa">${r.upload_mbps ? r.upload_mbps + ' Mbps' : '—'}</span></div>
            </div>
            <div class="detail-section">
                <h4>MIC & DISK</h4>
                <div class="detail-row-item"><span class="label">Mic Device</span><span class="value">${r.mic_device || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Mic Level</span><span class="value">${r.mic_level || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Notes</span><span class="value" style="color:#fbbf24">${r.notes || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Disk Free</span><span class="value">${r.disk_space || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Disk Used</span><span class="value">${r.disk_used_pct ? r.disk_used_pct + '%' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">AnyDesk ID</span><span class="value" style="color:#00d4aa">${r.anydesk_id || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Last Check</span><span class="value">${r.last_checked || '—'}</span></div>
            </div>
        </div></td></tr>`;  // detail-row colspan updated for VPN & notes columns
    });

    tbody.innerHTML = html;
    document.getElementById('agent-count').textContent = data.length;
    document.getElementById('issue-count').textContent = issues;
}

function sortTable(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    const keys = ['res_id','agent_name','team','anydesk_id','pc_specs','chrome_version','connection_type',
                  'connection_stability','internet_speed','vpn_active','mic_level','notes','disk_space','last_checked'];
    const key = keys[col];
    allData.sort((a,b) => {
        const va = (a[key]||'').toString().toLowerCase();
        const vb = (b[key]||'').toString().toLowerCase();
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
    renderTable(allData);
}

function fetchResults() {
    fetch('/api/results')
        .then(r => r.json())
        .then(data => {
            allData = data;
            const q = document.getElementById('searchBox').value.toLowerCase();
            const filtered = q ? data.filter(r => (r.agent_name||'').toLowerCase().includes(q) || (r.anydesk_id||'').toLowerCase().includes(q)) : data;
            renderTable(filtered);
            document.getElementById('lastUpdated').textContent =
                'Last updated: ' + new Date().toLocaleTimeString() + ' · Auto-refreshes every 30s';
        })
        .catch(() => {});
}

document.getElementById('searchBox').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const filtered = q ? allData.filter(r => (r.agent_name||'').toLowerCase().includes(q) || (r.anydesk_id||'').toLowerCase().includes(q)) : allData;
    renderTable(filtered);
});

fetchResults();
setInterval(fetchResults, 30000);
</script>
</body>
</html>
