<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0a0e17; color:#e0e4ec; min-height:100vh; }

        /* Header */
        .header { display:flex; align-items:center; justify-content:space-between; padding:18px 32px;
                   background:linear-gradient(135deg,#0d1220,#141c2e); border-bottom:1px solid #1e293b; }
        .header .logo { display:flex; align-items:center; gap:14px; }
        .header .logo-icon { width:38px; height:38px;
                             border-radius:10px; display:flex; align-items:center; justify-content:center;
                             object-fit: contain; }
        .header h1 { font-size:20px; font-weight:700; }
        .header h1 span { color:#00d4aa; }
        .header-right { display:flex; gap:12px; align-items:center; }
        .badge { padding:6px 16px; border-radius:8px; font-size:12px; font-weight:600;
                 background:#141c2e; border:1px solid #1e293b; }
        .badge .num { font-size:16px; font-weight:700; margin-left:6px; }
        .badge.agents .num { color:#00d4aa; }
        .badge.issues .num { color:#f59e0b; }
        .live-dot { width:8px; height:8px; border-radius:50%; background:#00d4aa; display:inline-block;
                    animation:pulse 2s infinite; margin-right:6px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
        .btn { padding:8px 18px; border-radius:8px; border:none; cursor:pointer; font-size:12px;
               font-weight:600; transition:.2s; }
        .btn-outline { background:transparent; border:1px solid #1e293b; color:#94a3b8; }
        .btn-outline:hover { border-color:#00d4aa; color:#00d4aa; }
        .btn-red { background:#dc2626; color:#fff; }
        .btn-red:hover { background:#ef4444; }

        /* Toolbar */
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:16px 32px; }
        .search-box { background:#141c2e; border:1px solid #1e293b; border-radius:10px; padding:10px 16px;
                      color:#e0e4ec; font-size:13px; width:260px; outline:none; font-family:inherit; }
        .search-box:focus { border-color:#00d4aa; }
        .last-updated { font-size:11px; color:#64748b; }

        /* Table */
        .table-wrap { padding:0 32px 32px; overflow-x:auto; max-height:calc(100vh - 180px); }
        table { width:100%; border-collapse:collapse; }
        thead th { background:#0d1220; color:#64748b; font-size:11px; font-weight:600;
                   text-transform:uppercase; letter-spacing:.5px; padding:12px 14px; text-align:left;
                   border-bottom:1px solid #1e293b; white-space:nowrap; cursor:pointer; user-select:none;
                   position:sticky; top:0; z-index:10; }
        thead th:hover { color:#00d4aa; }
        tbody tr { border-bottom:1px solid #111827; transition:.15s; cursor:pointer; }
        tbody tr:hover { background:#111827; }
        tbody tr.row-approved { background:rgba(5,46,22,0.25); border-left:3px solid #22c55e; }
        tbody tr.row-approved:hover { background:rgba(5,46,22,0.4); }
        tbody tr.row-rejected { background:rgba(69,10,10,0.25); border-left:3px solid #ef4444; }
        tbody tr.row-rejected:hover { background:rgba(69,10,10,0.4); }
        tbody td { padding:12px 14px; font-size:13px; vertical-align:top; }

        /* Detail row */
        .detail-row { display:none; }
        .detail-row.open { display:table-row; }
        .detail-row td { padding:0; background:#0d1220; }
        .detail-panel { padding:20px 28px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
        .detail-section { background:#111827; border-radius:10px; padding:16px; border:1px solid #1e293b; }
        .detail-section h4 { color:#00d4aa; font-size:11px; font-weight:700; text-transform:uppercase;
                             letter-spacing:.5px; margin-bottom:10px; }
        .detail-row-item { display:flex; justify-content:space-between; padding:5px 0;
                          font-size:12px; border-bottom:1px solid #1a2332; }
        .detail-row-item:last-child { border-bottom:none; }
        .detail-row-item .label { color:#64748b; }
        .detail-row-item .value { color:#e0e4ec; font-weight:500; }

        /* Status pills */
        .pill { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:600; display:inline-block; }
        .pill-good { background:#064e3b; color:#34d399; }
        .pill-warn { background:#451a03; color:#fbbf24; }
        .pill-bad { background:#450a0a; color:#f87171; }
        .pill-neutral { background:#1e293b; color:#94a3b8; }
        .pill-wifi { background:#1e1b4b; color:#818cf8; }
        .pill-eth { background:#022c22; color:#6ee7b7; }

        /* Empty state */
        .empty { text-align:center; padding:80px 20px; }
        .empty-icon { font-size:48px; margin-bottom:16px; opacity:.3; }
        .empty h3 { color:#64748b; font-weight:600; margin-bottom:6px; }
        .empty p { color:#475569; font-size:13px; }
 
        /* Delete button */
        .btn-delete { background:transparent; border:1px solid #1e293b; color:#64748b; padding:4px 10px;
                      border-radius:6px; cursor:pointer; font-size:12px; transition:.2s; }
        .btn-delete:hover { border-color:#dc2626; color:#f87171; background:#450a0a; }
        /* Graduate button — moves agent out of Newcomers without deleting */
        .btn-graduate { background:transparent; border:1px solid #4c1d95; color:#a78bfa; padding:4px 10px;
                        border-radius:6px; cursor:pointer; font-size:12px; transition:.2s; }
        .btn-graduate:hover { border-color:#818cf8; color:#c4b5fd; background:#2e1065; }

        
        /* PDF / Copy buttons */
        .btn-pdf { background:transparent; border:1px solid #1e293b; color:#94a3b8; padding:4px 10px;
                   border-radius:6px; cursor:pointer; font-size:11px; transition:.2s; margin-right:4px; }
        .btn-pdf:hover { border-color:#00d4aa; color:#00d4aa; background:#064e3b; }
        .btn-copy { background:transparent; border:1px solid #1e293b; color:#94a3b8; padding:4px 10px;
                    border-radius:6px; cursor:pointer; font-size:11px; transition:.2s; margin-right:4px; }
        .btn-copy:hover { border-color:#22c55e; color:#bbf7d0; background:#022c22; }

        /* Freshness Highlights */
        .date-cell { font-family: monospace; white-space: nowrap; }
        .date-stale { color: #f87171 !important; font-weight: 600; /* Red for old data */ }
        .date-warn { color: #fbbf24 !important; font-weight: 600; /* Yellow for yesterday */ }
        .date-fresh { color: #34d399 !important; /* Green for today */ }

        /* Responsive */
        @media(max-width:1200px) { .detail-panel { grid-template-columns:1fr 1fr; } }
        @media(max-width:768px) { .detail-panel { grid-template-columns:1fr; } }

        /* Newcomer view tabs */
        .view-tabs { display:flex; gap:8px; align-items:center; }
        .view-tab { padding:7px 18px; border-radius:8px; border:1px solid #1e293b; cursor:pointer;
                    font-size:12px; font-weight:600; background:#141c2e; color:#94a3b8; transition:.2s; }
        .view-tab:hover { border-color:#00d4aa; color:#00d4aa; }
        .view-tab.active { background:#064e3b; border-color:#22c55e; color:#34d399; }
        .view-tab.new-tab.active { background:#1e1b4b; border-color:#818cf8; color:#a78bfa; }
        /* Newcomer separator banner */
        .newcomer-banner { background:linear-gradient(90deg,#1e1b4b,#0d1220); border-left:3px solid #818cf8;
                           padding:10px 32px; font-size:12px; color:#a78bfa; font-weight:600;
                           letter-spacing:.5px; text-transform:uppercase; }
        /* Speed pill */
        .pill-speed-good { background:#064e3b; color:#34d399; }
        .pill-speed-bad  { background:#450a0a; color:#f87171; }
        .speed-pill-wrap { display:flex; flex-direction:column; gap:3px; }

        /* Has Issues toggle */
        .btn-issues { padding:7px 14px; border-radius:8px; border:1px solid #1e293b; cursor:pointer;
                      font-size:12px; font-weight:600; background:#141c2e; color:#94a3b8; transition:.2s; }
        .btn-issues:hover { border-color:#f59e0b; color:#fbbf24; }
        .btn-issues.active { background:#451a03; border-color:#f59e0b; color:#fbbf24; }

        /* Bulk action bar */
        .bulk-bar { display:none; align-items:center; gap:12px; padding:10px 32px;
                    background:linear-gradient(90deg,#141c2e,#0d1220); border-bottom:1px solid #1e293b; }
        .bulk-bar.visible { display:flex; }
        .bulk-bar .bulk-count { color:#00d4aa; font-weight:600; font-size:13px; }
        .bulk-bar .btn-bulk { padding:6px 14px; border-radius:6px; border:1px solid #1e293b;
                              cursor:pointer; font-size:12px; font-weight:600; transition:.2s; background:transparent; }
        .bulk-bar .btn-bulk.grad { color:#a78bfa; border-color:#4c1d95; }
        .bulk-bar .btn-bulk.grad:hover { background:#2e1065; color:#c4b5fd; }
        .bulk-bar .btn-bulk.del { color:#f87171; border-color:#450a0a; }
        .bulk-bar .btn-bulk.del:hover { background:#450a0a; color:#fca5a5; }
        .bulk-bar .btn-bulk.clear { color:#94a3b8; }
        .bulk-bar .btn-bulk.clear:hover { color:#e0e4ec; border-color:#64748b; }

        /* Checkbox column */
        .chk-col { width:36px; text-align:center; cursor:default; }
        .chk-col input[type="checkbox"] { width:15px; height:15px; accent-color:#00d4aa; cursor:pointer; }
        /* Tab count badge */
        .tab-count { background:#1e293b; color:#94a3b8; font-size:10px; padding:1px 7px; border-radius:10px;
                     margin-left:6px; font-weight:700; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="/favicon.ico" class="logo-icon" alt="V">
        <h1>IT Dashboard</h1>
    </div>
    <div class="header-right">
        <div class="badge agents">AGENTS <span class="num" id="agent-count">0</span></div>
        <div class="badge issues">ISSUES <span class="num" id="issue-count">0</span></div>
        <div id="badge-approved" class="badge" style="border-color:#064e3b; display:none">APPROVED <span class="num" style="color:#22c55e" id="approved-count">0</span></div>
        <div id="badge-rejected" class="badge" style="border-color:#450a0a; display:none">REJECTED <span class="num" style="color:#ef4444" id="rejected-count">0</span></div>
        <span style="color:#94a3b8;font-size:12px"><span class="live-dot"></span> LIVE</span>
        <a href="/logout" class="btn btn-red">Logout</a>
    </div>
</div>

<div class="toolbar">
    <div style="display:flex;gap:10px;align-items:center">
        <input class="search-box" type="text" id="searchBox" placeholder="Search agents...">
        <select id="teamFilter" class="search-box" style="width:160px;cursor:pointer">
            <option value="">All Teams</option>
        </select>
        <div class="view-tabs">
            <button class="view-tab active" id="tabAll" onclick="switchView('all')">All Agents <span class="tab-count" id="countAll">0</span></button>
            <button class="view-tab new-tab" id="tabNew" onclick="switchView('new')">Newcomers <span class="tab-count" id="countNew">0</span></button>
        </div>
        <select id="approvalFilter" class="search-box" style="width:160px;cursor:pointer;display:none" onchange="applyFilters()">
            <option value="">All Status</option>
            <option value="approved">Approved</option>
            <option value="not_approved">Not Approved</option>
        </select>
        <button class="btn-issues" id="btnIssues" onclick="toggleIssuesFilter()">Has Issues</button>
    </div>
    <span class="last-updated" id="lastUpdated">Loading...</span>
</div>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulkBar">
    <span class="bulk-count"><span id="bulkCount">0</span> selected</span>
    <button class="btn-bulk grad" id="bulkGrad" onclick="bulkGraduate()" style="display:none">Done (graduate)</button>
    <button class="btn-bulk del" id="bulkDel" onclick="bulkDelete()">Delete selected</button>
    <button class="btn-bulk clear" onclick="clearSelection()">Clear</button>
</div>

<div class="table-wrap">
<table id="resultsTable">
    <thead>
        <tr>
            <th class="chk-col" onclick="event.stopPropagation()"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
            <th onclick="sortTable(0)">RES-ID ▵</th>
            <th onclick="sortTable(1)">Agent ▵</th>
            <th onclick="sortTable(2)">Team ▵</th>
            <th onclick="sortTable(3)">AnyDesk ▵</th>
            <th onclick="sortTable(4)">PC Specs ▵</th>
            <th onclick="sortTable(5)">Chrome ▵</th>
            <th onclick="sortTable(6)">Network ▵</th>
            <th onclick="sortTable(7)">Connection ▵</th>
            <th onclick="sortTable(8)">Speed ▵</th>
            <th onclick="sortTable(9)">VPN ▵</th>
            <th onclick="sortTable(10)">Mic ▵</th>
            <th onclick="sortTable(11)">Notes ▵</th>
            <th onclick="sortTable(12)">Disk ▵</th>
            <th onclick="sortTable(13)">Checked ▵</th>
            <th style="width:50px"></th>
        </tr>
    </thead>
    <tbody id="resultsBody">
        <tr><td colspan="16">
            <div class="empty">
                <div class="empty-icon">—</div>
                <h3>No agents yet</h3>
                <p>Run VOS on any machine and the results will appear here automatically.</p>
            </div>
        </td></tr>
    </tbody>
</table>
</div>

<script>
let allData = [];
let sortCol = -1, sortAsc = true;
const expandedAgents = new Set(); // Track expanded agent names

// Helper: Format date string to stacked 12h format
function formatDateTime12h(dateStr) {
    if (!dateStr || dateStr === '—') return '—';
    try {
        const d = new Date(dateStr.replace(' ', 'T')); // Handle SQL format
        if (isNaN(d.getTime())) return dateStr;
        
        const datePart = d.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'numeric',
            day: 'numeric'
        });
        
        const timePart = d.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });

        return `<div class="date-stacked">
                    <div>${datePart}</div>
                    <div style="opacity:0.6; font-size:0.85em; margin-top:2px;">${timePart}</div>
                </div>`;
    } catch (e) {
        return dateStr;
    }
}

// Helper: Check freshness
function getDateFreshnessClass(dateStr) {
    if (!dateStr || dateStr === '—') return '';
    try {
        const d = new Date(dateStr.replace(' ', 'T'));
        if (isNaN(d.getTime())) return '';
        
        const now = new Date();
        const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
        
        const isToday = d.toDateString() === now.toDateString();
        if (isToday) return 'date-fresh';
        if (diffDays < 1) return 'date-warn'; // Yesterday
        return 'date-stale'; // Older
    } catch (e) {
        return '';
    }
}

// Team color palette — each team gets a unique, consistent color
const TEAM_COLORS = [
    { bg:'#422006', fg:'#fbbf24' },  // amber/yellow
    { bg:'#0c4a6e', fg:'#38bdf8' },  // sky blue
    { bg:'#064e3b', fg:'#34d399' },  // emerald
    { bg:'#4c1d95', fg:'#a78bfa' },  // purple
    { bg:'#831843', fg:'#f472b6' },  // pink
    { bg:'#1e3a5f', fg:'#60a5fa' },  // blue
    { bg:'#713f12', fg:'#facc15' },  // gold
    { bg:'#134e4a', fg:'#2dd4bf' },  // teal
    { bg:'#7c2d12', fg:'#fb923c' },  // orange
    { bg:'#1e1b4b', fg:'#818cf8' },  // indigo
    { bg:'#3b0764', fg:'#c084fc' },  // violet
    { bg:'#052e16', fg:'#4ade80' },  // green
];

// Normalize team name so NEW / new / New are all treated as one team
function normalizeTeam(name) {
    if (!name) return name;
    if (name.trim().toLowerCase() === 'new') return 'NEW';
    return name.trim();
}

function teamHash(name) {
    let h = 0;
    const s = normalizeTeam(name || '').toLowerCase();
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

function teamPill(name) {
    const n = normalizeTeam(name);
    if (!n || n === '—') return '<span class="pill pill-neutral">—</span>';
    if (n === 'NEW') return '<span class="pill" style="background:#2e1065;color:#c084fc">NEW</span>';
    const c = TEAM_COLORS[teamHash(n) % TEAM_COLORS.length];
    return `<span class="pill" style="background:${c.bg};color:${c.fg}">${n}</span>`;
}

function speedPill(dlMbps, ulMbps) {
    const dl = parseFloat(dlMbps || 0);
    const ul = parseFloat(ulMbps || 0);
    if (dl <= 0 && ul <= 0) return '<span class="pill pill-neutral">—</span>';
    const dlOk = dl >= 10.0;
    const ulOk = ul >= 2.0;
    const dlClass = dlOk ? 'pill pill-speed-good' : 'pill pill-speed-bad';
    const ulClass = ulOk ? 'pill pill-speed-good' : 'pill pill-speed-bad';
    return `<div class="speed-pill-wrap">
        <span class="${dlClass}">↓ ${dl} Mbps</span>
        <span class="${ulClass}">↑ ${ul} Mbps</span>
    </div>`;
}

function connTypePill(type) {
    if (!type || type === '—') return '<span class="pill pill-neutral">—</span>';
    const t = type.toLowerCase();
    if (t.includes('wi-fi') || t.includes('wifi')) return '<span class="pill pill-bad">' + type + '</span>';
    if (t.includes('ethernet') || t.includes('eth')) return '<span class="pill pill-good">' + type + '</span>';
    return '<span class="pill pill-neutral">' + type + '</span>';
}

function statusPill(text) {
    if (!text || text === '—') return '<span class="pill pill-neutral">—</span>';
    const t = text.toLowerCase();
    if (t === 'not approved') return '<span class="pill pill-bad">' + text + '</span>';
    if (t === 'approved') return '<span class="pill pill-good">' + text + '</span>';
    if (t.includes('good') || t.includes('up_to_date') || t.includes('up to date')) return '<span class="pill pill-good">' + text + '</span>';
    if (t.includes('fair') || t.includes('warn')) return '<span class="pill pill-warn">' + text + '</span>';
    if (t.includes('poor') || t.includes('bad') || t.includes('outdated') || t.includes('needs update')) return '<span class="pill pill-bad">' + text + '</span>';
    return '<span class="pill pill-neutral">' + text + '</span>';
}

function specsPill(label) {
    if (!label || label === '—') return '<span class="pill pill-neutral">—</span>';
    const l = label.toLowerCase();
    if (l === 'approved') return '<span class="pill pill-good">Approved</span>';
    if (l === 'not approved') return '<span class="pill pill-bad">Not Approved</span>';
    return '<span class="pill pill-neutral">' + label + '</span>';
}

function pingStatusPill(verdict) {
    if (!verdict || verdict === '—') return '<span class="pill pill-neutral">—</span>';
    const v = verdict.toUpperCase();
    if (v === 'GOOD') return '<span class="pill pill-good">GOOD</span>';
    if (v === 'MARGINAL') return '<span class="pill pill-warn">MARGINAL</span>';
    if (v === 'POOR') return '<span class="pill pill-bad">POOR</span>';
    return `<span class="pill pill-neutral">${v}</span>`;
}

function micDevicePill(deviceStr) {
    if (!deviceStr || deviceStr === '—') return '<span class="pill pill-neutral">—</span>';
    const d = deviceStr.toLowerCase();
    // Check the type suffix first (after the — separator)
    const parts = deviceStr.split('—');
    const typePart = parts.length > 1 ? parts[parts.length - 1].trim().toLowerCase() : '';
    // 1. USB — always good
    if (typePart === 'usb' || d.includes('usb')) return '<span class="pill pill-good">USB</span>';
    // 2. AUX / 3.5mm jack — warning
    if (typePart === 'aux' || d.includes('aux') || d.includes('jack')) return '<span class="pill pill-warn">AUX</span>';
    // 3. Built-in / internal / array — bad
    if (typePart === 'built-in' || d.includes('built-in') || d.includes('array') || d.includes('internal')) return '<span class="pill pill-bad">Built-in</span>';
    // Fallback — show the type if available
    if (typePart) return '<span class="pill pill-warn">' + parts[parts.length - 1].trim() + '</span>';
    return '<span class="pill pill-warn">' + deviceStr.split('—')[0].trim() + '</span>';
}

function vpnPill(active, name) {
    if (active) return '<span class="pill pill-bad">Yes</span>';
    return '<span class="pill pill-good">No</span>';
}

async function copySummary(index, evt) {
    if (evt) {
        evt.stopPropagation();
    }
    const r = allData[index];
    if (!r) return;

    let ping = {};
    try { ping = JSON.parse(r.ping_details || '{}'); } catch (e) {}

    // Headset type: plain text, no emojis/symbols
    const headsetType = r.mic_device && r.mic_device !== '—' ? r.mic_device : '—';

    // Connection type: strip any leading icons/bullets (e.g. "⦿ Ethernet" -> "Ethernet")
    let connType = r.connection_type && r.connection_type !== '—' ? r.connection_type : '—';
    if (connType !== '—') {
        connType = connType.replace(/^[^A-Za-z0-9]+/, '').trim();
    }
    const up = (r.upload_mbps || r.upload_mbps === 0) ? r.upload_mbps : '—';
    const down = (r.download_mbps || r.download_mbps === 0) ? r.download_mbps : '—';

    let stability = '—';
    if (ping && (ping.verdict || ping.avg_ms || ping.loss_pct !== undefined)) {
        const avg = ping.avg_ms !== undefined ? ping.avg_ms : '—';
        const loss = ping.loss_pct !== undefined ? ping.loss_pct : 0;
        stability = `${ping.verdict || '—'} (avg ${avg} ms, ${loss}% loss)`;
    } else if (r.connection_stability && r.connection_stability !== '—') {
        stability = r.connection_stability;
    }

    // Try to split "CPU / XXGB RAM" into separate fields so RAM isn't duplicated
    const specs = (r.pc_specs || '').split('/');
    const processor = (specs[0] || r.pc_specs || '—').trim() || '—';
    let ram = '—';
    if (specs.length > 1) {
        const ramMatch = specs[1].match(/(\d+)\s*GB/i);
        if (ramMatch) ram = ramMatch[1] + ' GB';
    } else {
        const ramMatch = (r.pc_specs || '').match(/(\d+)\s*GB/i);
        if (ramMatch) ram = ramMatch[1] + ' GB';
    }
    const storage = r.disk_space || '—';

    const summary = [
        '1. Headset Type',
        '   Type: ' + headsetType,
        '',
        '',
        '2. Internet Connection',
        '   Speed:      Upload ' + up + ' Mbps / Download ' + down + ' Mbps',
        '   Type:      ' + connType,
        '   Stability: ' + stability,
        '',
        '',
        '3. Device Information',
        '   Processor: ' + processor,
        '   RAM:       ' + ram,
        '   Storage:   ' + storage,
    ].join('\n');

    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(summary);
        } else {
            const ta = document.createElement('textarea');
            ta.value = summary;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        const el = document.getElementById('lastUpdated');
        if (el) {
            el.textContent = 'Summary copied for ' + (r.agent_name || 'agent');
        }
    } catch (e) {
        alert('Could not copy summary: ' + e.message);
    }
}

function deleteAgent(name) {
    if (!confirm('Are you sure you want to PERMANENTLY DELETE data for ' + name + '?')) return false;
    fetch('/api/results/' + encodeURIComponent(name), {
        method: 'DELETE',
        credentials: 'same-origin'
    })
    .then(r => {
        if (!r.ok) throw new Error('Server returned ' + r.status);
        return r.json();
    })
    .then(() => fetchResults())
    .catch(e => alert('Delete failed: ' + e.message));
    return false;
}

function graduateAgent(name) {
    if (!confirm('Move "' + name + '" out of Newcomers?\nThey will still appear in All Agents with their data intact.')) return false;
    fetch('/api/results/' + encodeURIComponent(name) + '/graduate', {
        method: 'PATCH',
        credentials: 'same-origin'
    })
    .then(r => {
        if (!r.ok) throw new Error('Server returned ' + r.status);
        return r.json();
    })
    .then(() => fetchResults())
    .catch(e => alert('Graduate failed: ' + e.message));
    return false;
}

function toggleDetail(name, i, evt) {
    // Don't toggle if clicking the delete or pdf button
    if (evt && evt.target && (evt.target.classList.contains('btn-delete') || evt.target.closest('.btn-delete') || evt.target.classList.contains('btn-pdf') || evt.target.closest('.btn-pdf'))) return;
    const row = document.getElementById('detail-' + i);
    if (row) {
        const isOpen = row.classList.toggle('open');
        if (isOpen) expandedAgents.add(name);
        else expandedAgents.delete(name);
    }
}

function downloadPDF(name) {
    const url = '/api/pdf/' + encodeURIComponent(name);
    window.open(url, '_blank');
}

function isAgentApproved(r) {
    const specsOk = (r.cpu_label && r.cpu_label.toLowerCase() === 'approved');
    const connType = (r.connection_type || '').toLowerCase();
    const isEth = connType.includes('ethernet') || connType.includes('eth');
    const dlVal = parseFloat(r.download_mbps || 0);
    const ulVal = parseFloat(r.upload_mbps || 0);
    const speedOk = (dlVal >= 10.0 && ulVal >= 2.0);
    const micStr = (r.mic_device || '').toLowerCase();
    const micParts = r.mic_device ? r.mic_device.split('\u2014') : [];
    const micType = micParts.length > 1 ? micParts[micParts.length - 1].trim().toLowerCase() : '';
    const micOk = micType === 'usb' || micStr.includes('usb');
    return specsOk && isEth && speedOk && micOk;
}

function renderTable(data) {
    const tbody = document.getElementById('resultsBody');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="16"><div class="empty"><div class="empty-icon">--</div><h3>No agents yet</h3><p>Run VOS on any machine and results appear here.</p></div></td></tr>';
        return;
    }

    let html = '';
    let issues = 0;
    let approvedCount = 0;
    let rejectedCount = 0;
    data.forEach((r, i) => {
        // Parse ping details
        let ping = {};
        try { ping = JSON.parse(r.ping_details || '{}'); } catch(e) {}

        // Count issues
        const connScore = ping.score || 0;
        if (connScore > 0 && connScore < 60) issues++;
        const dl = r.download_mbps || 0;
        if (dl > 0 && dl < 10) issues++;

        // Overall approval check
        const specsOk = (r.cpu_label && r.cpu_label.toLowerCase() === 'approved');
        const connType = (r.connection_type || '').toLowerCase();
        const isEth = connType.includes('ethernet') || connType.includes('eth');
        const dlVal = parseFloat(r.download_mbps || 0);
        const ulVal = parseFloat(r.upload_mbps || 0);
        const speedOk = (dlVal >= 10.0 && ulVal >= 2.0);
        const micStr = (r.mic_device || '').toLowerCase();
        const micParts = r.mic_device ? r.mic_device.split('\u2014') : [];
        const micType = micParts.length > 1 ? micParts[micParts.length - 1].trim().toLowerCase() : '';
        const micOk = micType === 'usb' || micStr.includes('usb');
        const isApproved = specsOk && isEth && speedOk && micOk;
        if (isApproved) approvedCount++; else rejectedCount++;
        const rowClass = isApproved ? 'row-approved' : 'row-rejected';

        const freshnessClass = getDateFreshnessClass(r.last_checked);
        const formattedDate = formatDateTime12h(r.last_checked);
        const isRowExpanded = expandedAgents.has(r.agent_name) ? 'open' : '';

        // Main row
        html += `<tr class="${rowClass}" onclick="toggleDetail('${(r.agent_name||'').replace(/'/g, "\\'")}', ${i}, event)">
            <td class="chk-col" onclick="event.stopPropagation()"><input type="checkbox" class="row-chk" data-agent="${(r.agent_name||'').replace(/"/g, '&quot;')}" onchange="updateBulkBar()"></td>
            <td style="color:#f472b6;font-weight:bold">${r.res_id || '—'}</td>
            <td><strong>${r.agent_name || '—'}</strong></td>
            <td>${teamPill(r.team)}</td>
            <td style="color:#00d4aa;font-family:monospace">${r.anydesk_id || '—'}</td>
            <td>${specsPill(r.cpu_label)}</td>
            <td>${statusPill(r.chrome_version)}</td>
            <td>${connTypePill(r.connection_type)}</td>
            <td>${pingStatusPill(ping.verdict)}</td>
            <td>${speedPill(r.download_mbps, r.upload_mbps)}</td>
            <td>${vpnPill(r.vpn_active, r.vpn_name)}</td>
            <td>${micDevicePill(r.mic_device)}</td>
            <td><small style="color:#fbbf24">${r.notes || ''}</small></td>
            <td>${r.disk_space || '—'}</td>
            <td class="date-cell ${freshnessClass}">${formattedDate}</td>
            <td>
                <div style="display:flex;align-items:center">
                    <button class="btn-copy" onclick="copySummary(${i}, event); return false;" title="Copy summary to clipboard">Copy</button>
                    <button class="btn-pdf" onclick="downloadPDF('${(r.agent_name||'').replace(/'/g, "\\'")}'); return false;" title="Download PDF Report">PDF</button>
                    ${ currentView === 'new'
                        ? `<button class="btn-graduate" onclick="graduateAgent('${(r.agent_name||'').replace(/'/g, "\\'")}'); return false;" title="Remove from Newcomers (keep in All Agents)">✓ Done</button>`
                        : `<button class="btn-delete" onclick="deleteAgent('${(r.agent_name||'').replace(/'/g, "\\'")}'); return false;" title="Delete this agent">x</button>`
                    }
                </div>
            </td>
        </tr>`;

        // Detail row
        html += `<tr class="detail-row ${isRowExpanded}" id="detail-${i}"><td colspan="13"><div class="detail-panel">
            <div class="detail-section">
                <h4>SYSTEM</h4>
                <div class="detail-row-item"><span class="label">RES-ID</span><span class="value" style="color:#f472b6;font-weight:bold">${r.res_id || '—'}</span></div>
                <div class="detail-row-item"><span class="label">CPU</span><span class="value">${r.pc_specs || '—'}</span></div>
                <div class="detail-row-item"><span class="label">GPU</span><span class="value">${r.gpu || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Performance</span><span class="value">${statusPill(r.cpu_label || '—')}</span></div>
                <div class="detail-row-item"><span class="label">Chrome</span><span class="value">${r.chrome_version || '—'}</span></div>
            </div>
            <div class="detail-section">
                <h4>NETWORK</h4>
                <div class="detail-row-item"><span class="label">Type</span><span class="value">${r.connection_type || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Ping Score</span><span class="value">${ping.score ? ping.score + '/100 (' + ping.verdict + ')' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Avg Latency</span><span class="value">${ping.avg_ms ? ping.avg_ms + ' ms' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Jitter</span><span class="value">${ping.jitter_ms ? ping.jitter_ms + ' ms' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Packet Loss</span><span class="value">${ping.loss_pct ? ping.loss_pct + '%' : '0%'}</span></div>
                <div class="detail-row-item"><span class="label">Spikes</span><span class="value">${ping.spikes !== undefined ? ping.spikes : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Distribution</span><span class="value" style="color:#fbbf24">${ping.distribution || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Target</span><span class="value">${ping.target || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Download</span><span class="value" style="color:#34d399">${r.download_mbps ? r.download_mbps + ' Mbps' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">Upload</span><span class="value" style="color:#60a5fa">${r.upload_mbps ? r.upload_mbps + ' Mbps' : '—'}</span></div>
            </div>
            <div class="detail-section">
                <h4>MIC & DISK</h4>
                <div class="detail-row-item"><span class="label">Mic Device</span><span class="value">${r.mic_device || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Mic Level</span><span class="value">${r.mic_level || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Notes</span><span class="value" style="color:#fbbf24">${r.notes || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Disk Free</span><span class="value">${r.disk_space || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Disk Used</span><span class="value">${r.disk_used_pct ? r.disk_used_pct + '%' : '—'}</span></div>
                <div class="detail-row-item"><span class="label">AnyDesk ID</span><span class="value" style="color:#00d4aa">${r.anydesk_id || '—'}</span></div>
                <div class="detail-row-item"><span class="label">Last Check</span><span class="value">${formatDateTime12h(r.last_checked) || '—'}</span></div>
            </div>
        </div></td></tr>`;  // detail-row colspan updated for VPN & notes columns
    });

    tbody.innerHTML = html;
    document.getElementById('agent-count').textContent = data.length;
    document.getElementById('issue-count').textContent = issues;
    document.getElementById('approved-count').textContent = approvedCount;
    document.getElementById('rejected-count').textContent = rejectedCount;

    // Update tab counts
    updateTabCounts();
    // Restore checkbox state from selectedAgents set (survives re-renders)
    restoreCheckboxes();
    updateBulkBar();
}

function sortTable(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    const keys = ['res_id','agent_name','team','anydesk_id','pc_specs','chrome_version','connection_type',
                  'connection_stability','internet_speed','vpn_active','mic_level','notes','disk_space','last_checked'];
    const key = keys[col];
    allData.sort((a,b) => {
        const va = (a[key]||'').toString().toLowerCase();
        const vb = (b[key]||'').toString().toLowerCase();
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
    renderTable(allData);
}

let currentView = 'all'; // 'all' or 'new'
let issuesFilterOn = false;
const selectedAgents = new Set();

function switchView(view) {
    currentView = view;
    document.getElementById('tabAll').classList.toggle('active', view === 'all');
    document.getElementById('tabNew').classList.toggle('active', view === 'new');
    
    // Show/hide UI elements depending on view
    document.getElementById('teamFilter').style.display = (view === 'new') ? 'none' : '';
    
    const approvalEl = document.getElementById('approvalFilter');
    approvalEl.style.display = (view === 'new') ? '' : 'none';
    approvalEl.value = ''; // reset on switch

    // Show APPROVED/REJECTED badges only in Newcomers view
    document.getElementById('badge-approved').style.display = (view === 'new') ? '' : 'none';
    document.getElementById('badge-rejected').style.display = (view === 'new') ? '' : 'none';
    
    // Show/hide bulk graduate button
    document.getElementById('bulkGrad').style.display = (view === 'new') ? '' : 'none';
    document.getElementById('bulkDel').style.display = (view === 'new') ? 'none' : '';
    
    clearSelection();
    applyFilters();
}

// Has Issues toggle
function toggleIssuesFilter() {
    issuesFilterOn = !issuesFilterOn;
    document.getElementById('btnIssues').classList.toggle('active', issuesFilterOn);
    applyFilters();
}

function hasIssues(r) {
    // Not approved = has issues
    return !isAgentApproved(r);
}

function applyFilters() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    const team = document.getElementById('teamFilter').value;
    let filtered = allData;

    // Normalize teams before filtering
    filtered = filtered.map(r => ({ ...r, team: normalizeTeam(r.team) }));

    if (currentView === 'new') {
        // Show only newcomers (team === 'NEW')
        filtered = filtered.filter(r => (r.team || '').toUpperCase() === 'NEW');
        // Apply approval filter if set
        const approvalSel = document.getElementById('approvalFilter').value;
        if (approvalSel === 'approved') {
            filtered = filtered.filter(r => isAgentApproved(r));
        } else if (approvalSel === 'not_approved') {
            filtered = filtered.filter(r => !isAgentApproved(r));
        }
    } else {
        if (team) {
            // If 'NEW' is selected in dropdown, match all normalized-NEW agents
            if (team.toUpperCase() === 'NEW') {
                filtered = filtered.filter(r => (r.team || '').toUpperCase() === 'NEW');
            } else {
                filtered = filtered.filter(r => (r.team || '') === team);
            }
        }
    }

    // Has Issues filter
    if (issuesFilterOn) {
        filtered = filtered.filter(r => hasIssues(r));
    }

    if (q) {
        filtered = filtered.filter(r =>
            (r.agent_name||'').toLowerCase().includes(q) ||
            (r.anydesk_id||'').toLowerCase().includes(q) ||
            (r.res_id||'').toLowerCase().includes(q)
        );
    }
    renderTable(filtered);
}

function updateTeamDropdown() {
    // Normalize team names before building dropdown — deduplicate NEW/new/New into 'NEW'
    const teams = [...new Set(allData.map(r => normalizeTeam(r.team)).filter(Boolean))].sort();
    const sel = document.getElementById('teamFilter');
    const current = normalizeTeam(sel.value) || '';
    sel.innerHTML = '<option value="">All Teams</option>' + teams.map(t => `<option value="${t}">${t}</option>`).join('');
    // Restore selection if it still exists
    if ([...sel.options].some(o => o.value === current)) sel.value = current;
}

// Tab counts
function updateTabCounts() {
    const normalized = allData.map(r => ({ ...r, team: normalizeTeam(r.team) }));
    const allCount = normalized.length;
    const newCount = normalized.filter(r => (r.team || '').toUpperCase() === 'NEW').length;
    document.getElementById('countAll').textContent = allCount;
    document.getElementById('countNew').textContent = newCount;
}

// Checkbox / bulk actions
function toggleSelectAll(masterCb) {
    const cbs = document.querySelectorAll('.row-chk');
    if (masterCb.checked) {
        cbs.forEach(cb => { cb.checked = true; selectedAgents.add(cb.dataset.agent); });
    } else {
        cbs.forEach(cb => { cb.checked = false; selectedAgents.delete(cb.dataset.agent); });
    }
    updateBulkBar();
}

function restoreCheckboxes() {
    // After a re-render, re-check boxes that were previously selected
    document.querySelectorAll('.row-chk').forEach(cb => {
        cb.checked = selectedAgents.has(cb.dataset.agent);
    });
}

function updateBulkBar() {
    // Sync from DOM checkboxes (for manual clicks) — merge into selectedAgents
    document.querySelectorAll('.row-chk').forEach(cb => {
        if (cb.checked) selectedAgents.add(cb.dataset.agent);
    });
    const bar = document.getElementById('bulkBar');
    const count = selectedAgents.size;
    document.getElementById('bulkCount').textContent = count;
    bar.classList.toggle('visible', count > 0);
    // Update master checkbox state
    const master = document.getElementById('selectAll');
    const allCbs = document.querySelectorAll('.row-chk');
    if (master && allCbs.length > 0) {
        const checkedCount = document.querySelectorAll('.row-chk:checked').length;
        master.checked = checkedCount === allCbs.length;
        master.indeterminate = checkedCount > 0 && checkedCount < allCbs.length;
    }
}

function clearSelection() {
    selectedAgents.clear();
    document.querySelectorAll('.row-chk').forEach(cb => cb.checked = false);
    const master = document.getElementById('selectAll');
    if (master) { master.checked = false; master.indeterminate = false; }
    updateBulkBar();
}

function bulkGraduate() {
    const names = [...selectedAgents];
    if (!names.length) return;
    if (!confirm('Graduate ' + names.length + ' agent(s) out of Newcomers?\nTheir data will be kept in All Agents.')) return;
    Promise.all(names.map(name =>
        fetch('/api/results/' + encodeURIComponent(name) + '/graduate', {
            method: 'PATCH', credentials: 'same-origin'
        })
    )).then(() => { clearSelection(); fetchResults(); })
      .catch(e => alert('Bulk graduate failed: ' + e.message));
}

function bulkDelete() {
    const names = [...selectedAgents];
    if (!names.length) return;
    if (!confirm('PERMANENTLY DELETE ' + names.length + ' agent(s)?\nThis cannot be undone.')) return;
    Promise.all(names.map(name =>
        fetch('/api/results/' + encodeURIComponent(name), {
            method: 'DELETE', credentials: 'same-origin'
        })
    )).then(() => { clearSelection(); fetchResults(); })
      .catch(e => alert('Bulk delete failed: ' + e.message));
}

function fetchResults() {
    fetch('/api/results')
        .then(r => r.json())
        .then(data => {
            allData = data;
            updateTeamDropdown();
            applyFilters();
            document.getElementById('lastUpdated').textContent =
                'Last updated: ' + new Date().toLocaleTimeString() + ' \u00b7 Auto-refreshes every 5s';
        })
        .catch(() => {});
}

document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('teamFilter').addEventListener('change', applyFilters);

fetchResults();
setInterval(fetchResults, 5000);
</script>
</body>
</html>
